let wishlist = new Set();

function renderGrid(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(p => `
    <div class="product-card" onclick="openPopup(${p.id})">
      <div class="card-img-wrap">
        ${p.isNew ? '<div class="card-mark">NEW</div>' : ''}
        <div class="card-img" style="background-image:url('${p.img}')"></div>
        <button class="card-fav ${wishlist.has(p.id)?'active':''}" id="fav-${p.id}"
          onclick="event.stopPropagation();toggleFav(${p.id})">
          <svg viewBox="0 0 21 18"><path d="M20 6.32647C20 11.4974 10.5 17 10.5 17C10.5 17 1 11.4974 1 6.32647C1 -0.694364 10.5 -0.599555 10.5 5.57947C10.5 -0.599555 20 -0.507124 20 6.32647Z"/></svg>
        </button>
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        ${p.descr ? `<div class="card-descr">${p.descr}</div>` : ''}
        <div class="card-price"><span>${p.price}</span><span class="card-price-cur">BYN</span></div>
      </div>
    </div>
  `).join('');
}

const allProducts = Object.values(sections).flat();

function toggleFav(id) {
  wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
  updateCounter();
  const btn = document.getElementById('fav-'+id);
  if (btn) btn.classList.toggle('active', wishlist.has(id));
}
function updateCounter() {
  const c = document.getElementById('wishlistCounter');
  c.textContent = wishlist.size;
  c.style.display = wishlist.size > 0 ? 'flex' : 'none';
}
function toggleWishlist() {
  if (!wishlist.size) return;
  alert('Избранное: ' + allProducts.filter(p=>wishlist.has(p.id)).map(p=>p.name).join(', '));
}
function openPopup(id) {
  const p = allProducts.find(x=>x.id===id);
  document.getElementById('popupImg').style.backgroundImage = `url('${p.img}')`;
  document.getElementById('popupName').textContent = p.name;
  document.getElementById('popupPrice').textContent = p.price;
  document.getElementById('popupDesc').textContent = p.descr || '—';
  document.getElementById('popup').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePopup() {
  document.getElementById('popup').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closePopup(); });
window.addEventListener('scroll', () => {
  document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 300);
});

renderGrid('grid-starters', sections.starters);
renderGrid('grid-salads', sections.salads);
renderGrid('grid-main', sections.main);
renderGrid('grid-rolls', sections.rolls);
renderGrid('grid-sides', sections.sides);
renderGrid('grid-desserts', sections.desserts);
