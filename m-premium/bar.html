let currentTab = 'cocktails';

function buildTabs() {
  const list = document.getElementById('tabsList');
  const sel = document.getElementById('tabsSelect');
  tabs.forEach(t => {
    const li = document.createElement('li');
    li.className = 'tab-item' + (t.id===currentTab?' active':'');
    li.innerHTML = `<button class="tab-btn" onclick="switchTab('${t.id}')">${t.label}</button>`;
    list.appendChild(li);
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.label;
    sel.appendChild(opt);
  });
}

function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('button').onclick.toString().includes(`'${id}'`));
  });
  document.getElementById('tabsSelect').value = id;
  renderTab(id);
}

function renderTab(id) {
  const tab = tabs.find(t=>t.id===id);
  let html = `
    <div class="section-watermark"><div class="section-watermark-text">${tab.watermark}</div></div>
  `;
  tab.sections.forEach(sec => {
    html += `<div class="section-title"><h2>${sec.title}</h2></div>`;
    html += `<div class="pricelist-wrap"><div class="pricelist-cols">`;
    const half = Math.ceil(sec.items.length / 2);
    const col1 = sec.items.slice(0, half);
    const col2 = sec.items.slice(half);
    html += `<div>` + col1.map(renderItem).join('') + `</div>`;
    html += `<div>` + col2.map(renderItem).join('') + `</div>`;
    html += `</div></div>`;
  });
  document.getElementById('tabContent').innerHTML = html;
}

function renderItem(item) {
  return `
    <div class="pricelist-item">
      <div class="pricelist-row">
        <div class="pricelist-name">${item.name}</div>
        <div class="pricelist-price">${item.price}</div>
      </div>
      <div class="pricelist-line"></div>
      ${item.descr ? `<div class="pricelist-descr">${item.descr}</div>` : ''}
    </div>
  `;
}

window.addEventListener('scroll', () => {
  document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 300);
});

buildTabs();
renderTab(currentTab);
