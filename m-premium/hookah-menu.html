<div class="divider"><div class="divider-inner"></div></div>

<div class="section-watermark"><div class="section-watermark-text">Hookahs</div></div>
<div class="section-title"><h2>Чаши и миксы</h2></div>
<div class="product-grid" id="productGrid"></div>

<button class="wishlist-btn" id="wishlistBtn" onclick="toggleWishlist()">
  <svg viewBox="0 0 41 35" xmlns="http://www.w3.org/2000/svg">
    <path d="M39.9516 11.9535C39.9516 22.5416 20.4993 33.8088 20.4993 33.8088C20.4993 33.8088 1.04688 22.5416 1.04688 11.9535C1.04688 -2.42254 20.4993 -2.2284 20.4993 10.4239C20.4993 -2.2284 39.9516 -2.03914 39.9516 11.9535Z"/>
  </svg>
  <span class="wishlist-counter" id="wishlistCounter">0</span>
</button>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 50 50"><path d="M14 28L25 18l11 10"/></svg>
</button>

<script>
const products = [
  { id:1, name:'Premium', price:43, img:'https://static.tildacdn.com/stor3831-6562-4131-a262-363062343430/35efa95fcb88f30e89aa1a937c6dc446.png' },
  { id:2, name:'Special', price:47, img:'https://static.tildacdn.com/stor6564-3365-4638-b130-363536336261/436f5dbf8635ae2981a0f15c6accbc6d.png' },
  { id:3, name:'Fruit', price:50, img:'https://static.tildacdn.com/stor3865-3730-4564-a161-323438363739/b019926abcf4fc99f0b91a1cf803e622.png' },
  { id:4, name:'Deus Perfume', price:99, img:'https://static.tildacdn.com/stor3763-6235-4933-a366-303735363633/dbca032942bbdf0e5c68f3618cbd243f.png' }
];

let wishlist = new Set();

function renderGrid() {
  document.getElementById('productGrid').innerHTML = products.map(p => `
    <div class="product-card">
      <div class="card-img-wrap">
        <div class="card-img" style="background-image:url('${p.img}')"></div>
        <button class="card-fav ${wishlist.has(p.id)?'active':''}" id="fav-${p.id}" onclick="toggleFav(${p.id})">
          <svg viewBox="0 0 21 18"><path d="M20 6.32647C20 11.4974 10.5 17 10.5 17C10.5 17 1 11.4974 1 6.32647C1 -0.694364 10.5 -0.599555 10.5 5.57947C10.5 -0.599555 20 -0.507124 20 6.32647Z"/></svg>
        </button>
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-price"><span>${p.price}</span><span class="card-price-cur">BYN</span></div>
      </div>
    </div>
  `).join('');
}

function toggleFav(id) {
  wishlist.has(id) ? wishlist.delete(id) : wishlist.add(id);
  const c = document.getElementById('wishlistCounter');
  c.textContent = wishlist.size;
  c.style.display = wishlist.size > 0 ? 'flex' : 'none';
  const btn = document.getElementById('fav-'+id);
  if (btn) btn.classList.toggle('active', wishlist.has(id));
}

function toggleWishlist() {
  if (!wishlist.size) return;
  alert('Избранное: ' + products.filter(p=>wishlist.has(p.id)).map(p=>p.name).join(', '));
}

window.addEventListener('scroll', () => {
  document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 300);
});

renderGrid();
</script>
</body>
</html>
