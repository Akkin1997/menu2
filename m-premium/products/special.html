<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; font-family: 'Involve', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
@font-face { font-family: 'Involve'; src: url('https://static.tildacdn.com/tild3637-3331-4131-b262-643136613465/Involve-Regular.woff') format('woff'); font-weight: 400; }
@font-face { font-family: 'Involve'; src: url('https://static.tildacdn.com/tild3831-3931-4336-a164-666230613237/Involve-Medium.woff') format('woff'); font-weight: 500; }
.prod-topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 30px; }
.prod-back { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #000; font-size: 13px; font-family: 'Involve', Arial, sans-serif; font-weight: 300; transition: opacity 0.2s; }
.prod-back:hover { opacity: 0.6; }
.prod-back svg { width: 22px; height: 22px; fill: #000; flex-shrink: 0; }
.prod-close { display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 4px; transition: opacity 0.2s; }
.prod-close:hover { opacity: 0.6; }
.prod-close svg { width: 20px; height: 20px; }
.prod-close svg rect { fill: #000; }
.prod-content { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 20px 80px 60px; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }
.prod-img { width: 100%; aspect-ratio: 1 / 1; background-size: cover; background-position: center; background-color: #1a1a1a; }
.prod-name { font-size: 24px; font-family: 'Panama', 'Involve', Arial, sans-serif; font-weight: 400; color: #dfdfdf; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px; display: block; line-height: 1.2; }
.prod-price { font-size: 18px; color: #dfdfdf; font-weight: 400; display: flex; gap: 4px; align-items: baseline; }
.prod-price-cur { font-size: 14px; opacity: 0.8; }
@media (max-width: 980px) { .prod-content { grid-template-columns: 1fr; padding: 20px 30px 60px; gap: 30px; } }
@media (max-width: 560px) { .prod-topbar { padding: 16px 20px; } .prod-content { padding: 10px 20px 40px; } }
</style>
</head>
<body>
<div class="prod-topbar">
  <a class="prod-back" href="../hookah-menu.html">
    <svg viewBox="0 0 26 26"><path d="M10.4142136,5 L11.8284271,6.41421356 L5.829,12.414 L23.4142136,12.4142136 L23.4142136,14.4142136 L5.829,14.414 L11.8284271,20.4142136 L10.4142136,21.8284271 L2,13.4142136 L10.4142136,5 Z"/></svg>
    Вернуться назад
  </a>
  <a class="prod-close" href="../hookah-menu.html">
    <svg viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
      <rect transform="translate(11.313708, 11.313708) rotate(-45) translate(-11.313708, -11.313708)" x="10.3137085" y="-3.6862915" width="2" height="30"/>
      <rect transform="translate(11.313708, 11.313708) rotate(-315) translate(-11.313708, -11.313708)" x="10.3137085" y="-3.6862915" width="2" height="30"/>
    </svg>
  </a>
</div>
<div class="prod-content">
  <div class="prod-img" style="background-image:url('https://static.tildacdn.com/stor6564-3365-4638-b130-363536336261/436f5dbf8635ae2981a0f15c6accbc6d.png')"></div>
  <div class="prod-info">
    <div class="prod-name">Special</div>
    <div class="prod-price"><span>47</span><span class="prod-price-cur">BYN</span></div>
  </div>
</div>
</body>
</html>
